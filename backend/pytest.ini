[pytest]
# Diretório de testes
testpaths = tests

# Modo assíncrono padrão para todos os testes (pytest-asyncio)
asyncio_mode = auto

# Exibir avisos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Exibir saída de print durante os testes
log_cli = true
log_cli_level = INFO

# Adicionar o diretório backend ao PYTHONPATH
pythonpath = .
